<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="logo">
    <img src="logo.png" alt="Company Logo">
</div>

        <div class="welcome-text">
            <h1>Welcome back 👋</h1>
            <p>To login enter your username and password.</p>
        </div>
    </div>

    <!-- RIGHT SIDE -->
   <div class="right">
        <div class="login-box">
            <form>
                <label>Email address</label>
                <input type="email" placeholder="Email address">
 <label>Password</label>
                <div class="password-field">
    <input type="password" id="password" placeholder="Password" required>
    <span class="fa-solid fa-eye-slash" id="toggleIcon" onclick="togglePassword()"> </span>       
</div>
        <a href="#" class="forgot" onclick="openPopup()">Forgot Password?</a>
        <button type="submit">Log in</button>
                <hr>
<a href="signup.html" class="create-account">
    Don't have an account? Create New Account
</a>

            </form>
        </div>
    </div>

</div>
<script>
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.getElementById("toggleIcon");

    if (password.type === "password") {
        password.type = "text";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    } else {
        password.type = "password";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }
}
</script>
<!-- Forgot Password Popup -->
<div class="popup" id="forgotPopup">
    <div class="popup-content">
        <h3>Forgot Password</h3>
        <p>Enter your email or phone number</p>
        
        <input type="text" id="forgotInput" placeholder="Email or Phone">
        <p class="error" id="errorMsg"></p>

        <div class="popup-buttons">
            <button onclick="closePopup()" class="cancel">Cancel</button>
            <button onclick="validateForgot()" class="submit">Submit</button>
        </div>
    </div>
</div>
<!-- STEP 2: Enter OTP Popup -->
<div class="popup" id="otpPopup">
    <div class="popup-content">
        <h3>Enter OTP</h3>
        <p>Please enter the OTP sent to your email or phone</p>
        
        <input type="text" placeholder="Enter OTP">

        <div class="popup-buttons">
            <button onclick="validateForgot()" class="cancel">Cancel</button>
            <button class="submit">Verify</button>
        </div>
    </div>
</div>
<script>
function openPopup() {
    document.getElementById("forgotPopup").style.display = "flex";
}

function closePopup() {
    document.getElementById("forgotPopup").style.display = "none";
}
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.getElementById("toggleIcon");

    if (password.type === "password") {
        password.type = "text";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    } else {
        password.type = "password";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }
}
function validateForgot() {
    const input = document.getElementById("forgotInput").value.trim();
    const error = document.getElementById("errorMsg");

    if (input === "") {
        error.innerText = "Please enter your email or phone number!";
        return;
    }

    // If input is filled → go to OTP page
    error.innerText = "";
    document.getElementById("forgotPopup").style.display = "none";
    document.getElementById("otpPopup").style.display = "flex";
}

function closeOtp() {
    document.getElementById("otpPopup").style.display = "none";
}
</script>
</body>
</html>
